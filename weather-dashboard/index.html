<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for a city..." class="search-input">
                <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </header>

        <main>
            <!-- Current Weather Section -->
            <section class="current-weather" id="currentWeather">
                <div class="loading" id="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading weather data...</p>
                </div>
            </section>

            <!-- Forecast Section -->
            <section class="forecast-section">
                <h2>5-Day Forecast</h2>
                <div class="forecast-container" id="forecastContainer">
                    <!-- Forecast cards will be populated here -->
                </div>
            </section>

            <!-- Additional Details -->
            <section class="details-section">
                <h2>Additional Details</h2>
                <div class="details-grid" id="detailsGrid">
                    <!-- Details will be populated here -->
                </div>
            </section>
        </main>

        <footer>
            <p>Weather data provided by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
            <p>Get your free API key at <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
